<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="건축자재 카탈로그 - 카테고리별 검색 및 상세 정보">
  <title>자재 카탈로그 | 건축자재 포털</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="index.html">
        <span class="site-brand__logo" aria-hidden="true">▣</span>
        <span class="site-brand__text">
          <strong>건축자재 포털</strong>
          <small>Architectural Materials</small>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="siteNav">
        <a class="site-nav__link" href="index.html">홈</a>
        <a class="site-nav__link is-active" href="catalog.html">자재 카탈로그</a>
        <a class="site-nav__link" href="about.html">소개</a>
        <a class="site-nav__link site-nav__link--cta" href="contact.html">문의하기</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <h1>자재 카탈로그</h1>
      <p>카테고리 필터와 검색으로 필요한 건축자재를 찾아보세요.</p>
    </div>

    <section class="toolbar">
      <div class="search">
        <label class="visually-hidden" for="searchInput">자재 검색</label>
        <input
          id="searchInput"
          type="search"
          placeholder="자재명, 설명, 태그 검색..."
          autocomplete="off"
        >
      </div>
      <div class="filters" id="categoryFilters" role="group" aria-label="카테고리 필터"></div>
    </section>

    <div class="catalog-meta">
      <span class="catalog-meta__count"><span id="totalCount">0</span>개 자재</span>
    </div>

    <section class="gallery-section">
      <div class="gallery" id="gallery" aria-live="polite"></div>
      <p class="empty-state" id="emptyState" hidden>검색 결과가 없습니다.</p>
    </section>
  </main>

  <dialog class="lightbox" id="lightbox" aria-labelledby="lightboxTitle">
    <button class="lightbox__close" type="button" aria-label="닫기">&times;</button>
    <figure class="lightbox__figure">
      <img class="lightbox__image" id="lightboxImage" src="" alt="">
      <figcaption class="lightbox__caption">
        <h2 id="lightboxTitle"></h2>
        <p id="lightboxDescription"></p>
        <div class="lightbox__meta">
          <span class="badge" id="lightboxCategory"></span>
          <span class="lightbox__tags" id="lightboxTags"></span>
        </div>
      </figcaption>
    </figure>
  </dialog>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__brand">
        <strong>건축자재 포털</strong>
        <p>건축 프로젝트를 위한 자재 정보 플랫폼</p>
      </div>
      <nav class="site-footer__nav">
        <a href="catalog.html">카탈로그</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
      </nav>
      <p class="site-footer__copy">&copy; 2026 건축자재 포털. All rights reserved.</p>
    </div>
  </footer>

  <script src="materials.js"></script>
  <script src="app.js"></script>
  <script src="nav.js"></script>
</body>
</html>
